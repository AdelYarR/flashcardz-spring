<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <h1>Регистрация</h1>

    <form method="post" th:action="@{/register}" th:object="${form}">
        <div class="error-message"
             th:if="${#fields.hasAnyErrors()}"
             th:text="${#fields.errors('*')[0]}">
        </div>
        <div>
            <label>
                <span>Email</span>
                <input th:field="*{email}" type="text" maxlength="255">
            </label>
        </div>
        <div>
            <label>
                <span>Пароль</span>
                <input th:field="*{password}" type="password" maxlength="32">
            </label>
        </div>
        <div>
            <label>
                <span>Подтверждение пароля</span>
                <input th:field="*{passwordConfirm}" type="password" maxlength="32">
            </label>
        </div>
        <button type="submit">Зарегистрироваться</button>
    </form>

    <p>
        Уже есть аккаунт? <a th:href="@{/login}">Войти</a>
    </p>
</div>
</body>
</html>
