<!doctype html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <a th:href="@{/hub/groups}" class="logo">
            <img th:src="@{/images/logo.png}" width="100" height="100">
        </a>

        <form method="get" th:action="@{/hub/groups}">
            <div id="search_bar">
                <input type="text" name="input_text" placeholder="Поиск...">
                <button type="submit">Отправить</button>
            </div>
        </form>

        <div class="profile_box">
            <a href="#" class="dropdown_profile">Профиль</a>
            <ul>
                <li>
                    <form method="get" th:action="@{/profile/groups}">
                        <button type="submit">Мои группы</button>
                    </form>
                </li>
                <li>
                    <form method="get" th:action="@{/options}">
                        <button type="submit">Настройки</button>
                    </form>
                </li>
                <li>
                    <form method="post" th:action="@{/logout}">
                        <button type="submit" onclick="return confirm('Вы уверены, что хотите выйти из аккаунта?')">Выход</button>
                    </form>
                </li>
            </ul>
        </div>
    </header>
</body>
</html>
